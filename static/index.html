<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Mentor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181d; --surface2: #1e2028;
      --border: #2a2d36; --accent: #7c6dfa; --accent2: #a78bfa;
      --user-bg: #1e1d2e; --user-border: #3d3870;
      --text: #e8e9f0; --muted: #6b7080; --green: #34d399;
      --radius: 14px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 820px; margin: 0 auto; }

    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); margin-left: auto;
      box-shadow: 0 0 8px var(--green);
    }

    #profile-bar {
      padding: 8px 24px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
      display: none; gap: 6px; align-items: center;
    }
    #profile-bar b { color: var(--accent2); }

    #messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 40px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); opacity: 0.5; }
    .empty-sub { font-size: 12px; line-height: 1.6; max-width: 300px; }

    .msg { display: flex; flex-direction: column; gap: 5px; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 0 4px; }
    .msg.user .msg-label { color: var(--accent2); text-align: right; }
    .bubble {
      padding: 12px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.7;
      border: 1px solid var(--border); background: var(--surface);
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); border-color: var(--user-border); align-self: flex-end; max-width: 80%; }
    .msg.assistant .bubble { max-width: 100%; }
    .bubble code { background: #0a0b0d; border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; font-size: 12px; color: var(--accent2); }
    .bubble pre { background: #0a0b0d; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin: 10px 0; overflow-x: auto; }
    .bubble pre code { background: none; border: none; padding: 0; color: var(--text); }

    .typing-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    .input-area {
      padding: 16px 24px 20px; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      color: var(--text); font-family: inherit; font-size: 14px;
      resize: none; outline: none; line-height: 1.6; max-height: 160px;
      transition: border-color .2s;
    }
    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent); }
    #send-btn {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s; color: white; font-size: 18px;
    }
    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .input-footer { display: flex; justify-content: space-between; margin-top: 10px; }
    .input-hint { font-size: 11px; color: var(--muted); }
    #clear-btn {
      font-size: 11px; color: var(--muted); background: none;
      border: none; cursor: pointer; font-family: inherit;
      padding: 2px 8px; border-radius: 6px;
    }
    #clear-btn:hover { color: var(--text); background: var(--surface2); }

    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #2d1515; border: 1px solid #5c2020; color: #f87171;
      padding: 10px 18px; border-radius: 10px; font-size: 12px;
      opacity: 0; transition: all .3s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">&#x1F9E0;</div>
    <div>
      <div class="header-title">AI Mentor</div>
      <div class="header-sub" id="model-label">Groq &middot; Llama 3.3 70B</div>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="profile-bar">
    &#x1F464; <b id="profile-name"></b> &nbsp;&middot;&nbsp; <span id="profile-working"></span>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">&#x1F4AC;</div>
      <div class="empty-title">Start a conversation</div>
      <div class="empty-sub">Ask me anything. I know your profile and remember our past sessions.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Ask your mentor anything..." rows="1"></textarea>
      <button id="send-btn" title="Send (Enter)">&#x27A4;</button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</span>
      <button id="clear-btn">&#x1F5D1; Clear chat</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const emptyState = document.getElementById('empty-state');
  const toast      = document.getElementById('toast');
  let isLoading = false;

  // Load profile
  fetch('/profile').then(r => r.json()).then(p => {
    if (p.name) {
      document.getElementById('profile-name').textContent = p.name;
      document.getElementById('profile-working').textContent = p.working_on || p.role || '';
      document.getElementById('profile-bar').style.display = 'flex';
    }
  });

  // Load history
  fetch('/history').then(r => r.json()).then(data => {
    if (data.messages && data.messages.length > 0) {
      emptyState.style.display = 'none';
      data.messages.forEach(m => appendMessage(m.role, m.content, false));
      scrollBottom();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // Enter to send
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', clearChat);

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    emptyState.style.display = 'none';

    appendMessage('user', text);
    const typingEl = appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Server error'); }
      const data = await res.json();
      typingEl.remove();
      appendMessage('assistant', data.reply);
    } catch (err) {
      typingEl.remove();
      showToast('Error: ' + err.message);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function clearChat() {
    if (!confirm('Clear all chat history?')) return;
    await fetch('/clear', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  }

  function appendMessage(role, content, animate = true) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    if (!animate) wrap.style.animation = 'none';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Mentor';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(content);
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Mentor';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function formatText(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
